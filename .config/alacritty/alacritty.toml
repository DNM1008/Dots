import = ["~/.config/alacritty/catppuccin/catppuccin-macchiato.toml"]

[env]
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR= "1"

[font]
size = 9.5

[font.bold]
family = "Fira Mono"

[font.italic]
family = "Fira Mono"

[font.normal]
family = "Fira Mono"
style = "Medium"

[window.padding]
x = 10
y = 0
