device_name = "ROYUAN R83"
phys = "usb-0000:54:00.0-3.3/input0"

[[remap]]

input = ["KEY_CAPSLOCK"]
output = ["KEY_TAB"]

[[remap]]

input = ["KEY_TAB"]
output = ["KEY_ESC"]

[[remap]]

input = ["KEY_ESC"]
output = ["KEY_CAPSLOCK"]

[[remap]]
input = ["KEY_LEFTALT", "KEY_UP"]
